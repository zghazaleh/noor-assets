name: validate

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate JSON (settings.json)
        run: |
          for f in $(find . -name '*.json' -not -path './.git/*'); do
            echo "checking $f"
            python3 -m json.tool "$f" > /dev/null
          done

      - name: Shell syntax + shellcheck
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck
          for f in $(find scripts -name '*.sh'); do
            echo "checking $f"
            bash -n "$f"
            shellcheck "$f"
          done

      - name: Skills have YAML frontmatter
        run: |
          fail=0
          for f in $(find .claude/skills -name 'SKILL.md'); do
            if ! head -1 "$f" | grep -q '^---$'; then
              echo "::error file=$f::missing YAML frontmatter (must start with ---)"
              fail=1
            fi
            for key in name description; do
              if ! grep -q "^$key:" "$f"; then
                echo "::error file=$f::frontmatter missing '$key:'"
                fail=1
              fi
            done
          done
          exit $fail

      - name: contacts.csv header is intact
        run: |
          expected='name,email,phone,whatsapp,telegram,linkedin,category,location,notes'
          actual="$(head -1 data/contacts.csv)"
          if [ "$actual" != "$expected" ]; then
            echo "::error::contacts.csv header drifted"
            echo "expected: $expected"
            echo "actual:   $actual"
            exit 1
          fi
